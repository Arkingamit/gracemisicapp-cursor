<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Grace Music — No Internet</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #09090b;
        color: #fafafa;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        padding-bottom: max(24px, env(safe-area-inset-bottom));
        background:
          radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 102, 241, 0.25), transparent),
          #09090b;
      }
      .card {
        width: 100%;
        max-width: 22rem;
        border-radius: 1.25rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(24, 24, 27, 0.95);
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.45);
        padding: 1.5rem;
        text-align: center;
      }
      .icon {
        width: 3.5rem;
        height: 3.5rem;
        margin: 0 auto 1rem;
        border-radius: 9999px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(56, 189, 248, 0.12);
        color: #38bdf8;
      }
      .icon svg {
        width: 1.75rem;
        height: 1.75rem;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.125rem;
        font-weight: 650;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
        font-size: 0.875rem;
        line-height: 1.5;
        color: #a1a1aa;
      }
      .actions {
        margin-top: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 0.625rem;
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 9999px;
        padding: 0.75rem 1rem;
        font-size: 0.9375rem;
        font-weight: 600;
        cursor: pointer;
      }
      button.primary {
        background: linear-gradient(90deg, #6366f1, #7c3aed);
        color: #fff;
      }
      button.primary:disabled {
        opacity: 0.6;
        cursor: wait;
      }
      button.ghost {
        background: transparent;
        color: #a1a1aa;
      }
      .status {
        margin-top: 0.875rem;
        font-size: 0.75rem;
        color: #71717a;
        min-height: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="card" role="dialog" aria-labelledby="offline-title">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 8.82A15 15 0 0 1 12 5c3.1 0 6 .9 8.4 2.4" />
          <path d="M5.5 12.5A10 10 0 0 1 12 10c1.9 0 3.7.5 5.2 1.4" />
          <path d="M9 16a5 5 0 0 1 6 0" />
          <line x1="2" y1="2" x2="22" y2="22" />
          <circle cx="12" cy="20" r="1" fill="currentColor" stroke="none" />
        </svg>
      </div>
      <h1 id="offline-title">No internet connection</h1>
      <p>
        Connect to Wi‑Fi or mobile data to use Grace Music. The app will open
        automatically when you’re back online.
      </p>
      <div class="actions">
        <button type="button" class="primary" id="retryBtn">Try again</button>
        <button type="button" class="ghost" id="settingsBtn">Open network settings</button>
      </div>
      <div class="status" id="status" aria-live="polite"></div>
    </div>

    <script>
      (function () {
        var APP_URL =
          (window.__GRACE_APP_URL && String(window.__GRACE_APP_URL)) ||
          "https://music.graceahmedabad.org/";
        var retryBtn = document.getElementById("retryBtn");
        var settingsBtn = document.getElementById("settingsBtn");
        var statusEl = document.getElementById("status");
        var retrying = false;

        function setStatus(msg) {
          statusEl.textContent = msg || "";
        }

        function retry() {
          if (retrying) return;
          retrying = true;
          retryBtn.disabled = true;
          setStatus("Checking connection…");
          try {
            window.location.replace(APP_URL);
          } catch (e) {
            retrying = false;
            retryBtn.disabled = false;
            setStatus("Still offline. Turn on mobile data or Wi‑Fi.");
          }
        }

        async function openSettings() {
          try {
            var C = window.Capacitor;
            if (C && C.Plugins && C.Plugins.GraceApp && C.Plugins.GraceApp.openNetworkSettings) {
              await C.Plugins.GraceApp.openNetworkSettings();
              return;
            }
          } catch (_) {}
          setStatus("Open Settings → Network & internet, then return here.");
        }

        retryBtn.addEventListener("click", retry);
        settingsBtn.addEventListener("click", openSettings);
        window.addEventListener("online", function () {
          setStatus("Connected — opening Grace Music…");
          retry();
        });

        // Backup poll in case the online event is missed in WebView
        setInterval(function () {
          if (navigator.onLine) {
            setStatus("Connected — opening Grace Music…");
            retry();
          }
        }, 2500);
      })();
    </script>
  </body>
</html>
